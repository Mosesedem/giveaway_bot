name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      SAFEHAVEN_MOCK: "true"
      PAYSTACK_MOCK: "true"
      FINTECH_MODE: "true"
      AUTO_PICK_WINNERS: "true"
      ENABLE_BOT_REPLIES: "true"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run migrations (SQLite)
        run: python -m alembic upgrade head

      - name: Pytest
        run: pytest tests/ -v --tb=short

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build image
        run: docker build -t giveaway-bot:ci .

      - name: Smoke run container
        run: |
          docker run -d --name gb-ci -p 6768:6768 \
            -e APP_PORT=6768 \
            -e SAFEHAVEN_MOCK=true \
            -e PAYSTACK_MOCK=true \
            -e ENABLE_SCHEDULER=false \
            giveaway-bot:ci
          for i in $(seq 1 30); do
            curl -sf http://localhost:6768/health && break
            sleep 2
          done
          curl -sf http://localhost:6768/health | grep -q '"status":"ok"'
          docker rm -f gb-ci