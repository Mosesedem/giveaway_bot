services:
  - type: web
    name: giveaway-bot
    runtime: python
    plan: starter
    buildCommand: pip install -r requirements.txt && alembic upgrade head
    startCommand: python -m uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: X_BEARER_TOKEN
        sync: false
      - key: X_API_KEY
        sync: false
      - key: X_API_SECRET
        sync: false
      - key: X_ACCESS_TOKEN
        sync: false
      - key: X_ACCESS_TOKEN_SECRET
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: giveaway-bot-db
          property: connectionString
      - key: BOT_CYCLE_SECONDS
        value: "90"
      - key: ENABLE_SCHEDULER
        value: "false"
      - key: FINTECH_MODE
        value: "true"
      - key: AUTO_PICK_WINNERS
        value: "true"
      - key: PUBLIC_BASE_URL
        sync: false
      - key: SAFEHAVEN_BASE_URL
        value: "https://api.sandbox.safehavenmfb.com"
      - key: SAFEHAVEN_CLIENT_ID
        sync: false
      - key: SAFEHAVEN_CLIENT_ASSERTION
        sync: false
      - key: SAFEHAVEN_PRIVATE_KEY
        sync: false
      - key: SAFEHAVEN_DEBIT_ACCOUNT
        sync: false
      - key: SAFEHAVEN_SETTLEMENT_ACCOUNT_NUMBER
        sync: false
      - key: SAFEHAVEN_SETTLEMENT_BANK_CODE
        value: "999240"
      - key: SAFEHAVEN_WEBHOOK_SECRET
        sync: false
      - key: REQUIRE_WEBHOOK_SECRET
        value: "true"
      - key: PAYSTACK_SECRET_KEY
        sync: false
      - key: PAYSTACK_PREFERRED_BANK
        value: "wema-bank"
      - key: TRANSACTION_FEE_MODE
        value: "percent_plus_fixed"
      - key: TRANSACTION_FEE_KOBO
        value: "20000"
      - key: TRANSACTION_FEE_PERCENT
        value: "2"
      - key: VA_VALID_FOR_SECONDS
        value: "86400"
      - key: RUN_ALEMBIC_ON_STARTUP
        value: "false"
      - key: CRON_WAKE_SECRET
        sync: false
      - key: DASHBOARD_USER
        sync: false
      - key: DASHBOARD_PASSWORD
        sync: false
      - key: TRUSTED_HOST_USER_IDS
        sync: false
      - key: REQUIRE_FOLLOW_HOST
        value: "true"
      - key: ENABLE_BOT_REPLIES
        value: "true"
      - key: DM_BATCH_SIZE
        value: "3"
      - key: DM_INTERVAL_SECONDS
        value: "15"

  - type: worker
    name: giveaway-bot-worker
    runtime: python
    plan: starter
    buildCommand: pip install -r requirements.txt && alembic upgrade head
    startCommand: python -m app.worker
    envVars:
      - key: X_BEARER_TOKEN
        fromService:
          type: web
          name: giveaway-bot
          envVarKey: X_BEARER_TOKEN
      - key: X_API_KEY
        fromService:
          type: web
          name: giveaway-bot
          envVarKey: X_API_KEY
      - key: X_API_SECRET
        fromService:
          type: web
          name: giveaway-bot
          envVarKey: X_API_SECRET
      - key: X_ACCESS_TOKEN
        fromService:
          type: web
          name: giveaway-bot
          envVarKey: X_ACCESS_TOKEN
      - key: X_ACCESS_TOKEN_SECRET
        fromService:
          type: web
          name: giveaway-bot
          envVarKey: X_ACCESS_TOKEN_SECRET
      - key: DATABASE_URL
        fromDatabase:
          name: giveaway-bot-db
          property: connectionString
      - key: BOT_CYCLE_SECONDS
        value: "90"
      - key: ENABLE_SCHEDULER
        value: "true"
      - key: FINTECH_MODE
        value: "true"
      - key: AUTO_PICK_WINNERS
        value: "true"
      - key: PUBLIC_BASE_URL
        fromService:
          type: web
          name: giveaway-bot
          property: host
      - key: SAFEHAVEN_BASE_URL
        value: "https://api.sandbox.safehavenmfb.com"
      - key: SAFEHAVEN_CLIENT_ID
        sync: false
      - key: SAFEHAVEN_CLIENT_ASSERTION
        sync: false
      - key: SAFEHAVEN_PRIVATE_KEY
        sync: false
      - key: SAFEHAVEN_DEBIT_ACCOUNT
        sync: false
      - key: SAFEHAVEN_SETTLEMENT_ACCOUNT_NUMBER
        sync: false
      - key: SAFEHAVEN_SETTLEMENT_BANK_CODE
        value: "999240"
      - key: PAYSTACK_SECRET_KEY
        sync: false
      - key: REQUIRE_FOLLOW_HOST
        value: "true"
      - key: ENABLE_BOT_REPLIES
        value: "true"
      - key: DM_BATCH_SIZE
        value: "3"
      - key: DM_INTERVAL_SECONDS
        value: "15"

  - type: cron
    name: giveaway-bot-wake
    runtime: python
    schedule: "*/10 * * * *"
    buildCommand: pip install -r requirements.txt
    startCommand: python scripts/cron_wake.py
    envVars:
      - key: CRON_WAKE_SECRET
        fromService:
          type: web
          name: giveaway-bot
          envVarKey: CRON_WAKE_SECRET
      - key: WAKE_HOST
        fromService:
          type: web
          name: giveaway-bot
          property: host

databases:
  - name: giveaway-bot-db
    plan: starter
    databaseName: giveaway_bot
    user: giveaway_bot