services:
  - type: web
    name: giveaway-bot
    runtime: python
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: X_BEARER_TOKEN
        sync: false
      - key: X_API_KEY
        sync: false
      - key: X_API_SECRET
        sync: false
      - key: X_ACCESS_TOKEN
        sync: false
      - key: X_ACCESS_TOKEN_SECRET
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: giveaway-bot-db
          property: connectionString
      - key: BOT_CYCLE_SECONDS
        value: "90"
      - key: ENABLE_SCHEDULER
        value: "true"

databases:
  - name: giveaway-bot-db
    plan: starter
    databaseName: giveaway_bot
    user: giveaway_bot
