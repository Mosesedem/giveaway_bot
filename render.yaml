services:
  - type: web
    name: giveaway-bot
    runtime: python
    plan: starter
    buildCommand: pip install -r requirements.txt && alembic upgrade head
    startCommand: python -m uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: X_BEARER_TOKEN
        sync: false
      - key: X_API_KEY
        sync: false
      - key: X_API_SECRET
        sync: false
      - key: X_ACCESS_TOKEN
        sync: false
      - key: X_ACCESS_TOKEN_SECRET
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: giveaway-bot-db
          property: connectionString
      - key: BOT_CYCLE_SECONDS
        value: "90"
      - key: ENABLE_SCHEDULER
        value: "false"
      - key: RUN_ALEMBIC_ON_STARTUP
        value: "false"
      - key: CRON_WAKE_SECRET
        sync: false
      - key: DASHBOARD_USER
        sync: false
      - key: DASHBOARD_PASSWORD
        sync: false
      - key: TRUSTED_HOST_USER_IDS
        sync: false
      - key: REQUIRE_FOLLOW_HOST
        value: "true"
      - key: ENABLE_BOT_REPLIES
        value: "true"
      - key: DM_BATCH_SIZE
        value: "3"
      - key: DM_INTERVAL_SECONDS
        value: "15"

  - type: worker
    name: giveaway-bot-worker
    runtime: python
    plan: starter
    buildCommand: pip install -r requirements.txt && alembic upgrade head
    startCommand: python -m app.worker
    envVars:
      - key: X_BEARER_TOKEN
        fromService:
          type: web
          name: giveaway-bot
          envVarKey: X_BEARER_TOKEN
      - key: X_API_KEY
        fromService:
          type: web
          name: giveaway-bot
          envVarKey: X_API_KEY
      - key: X_API_SECRET
        fromService:
          type: web
          name: giveaway-bot
          envVarKey: X_API_SECRET
      - key: X_ACCESS_TOKEN
        fromService:
          type: web
          name: giveaway-bot
          envVarKey: X_ACCESS_TOKEN
      - key: X_ACCESS_TOKEN_SECRET
        fromService:
          type: web
          name: giveaway-bot
          envVarKey: X_ACCESS_TOKEN_SECRET
      - key: DATABASE_URL
        fromDatabase:
          name: giveaway-bot-db
          property: connectionString
      - key: BOT_CYCLE_SECONDS
        value: "90"
      - key: ENABLE_SCHEDULER
        value: "true"
      - key: RUN_ALEMBIC_ON_STARTUP
        value: "false"
      - key: REQUIRE_FOLLOW_HOST
        value: "true"
      - key: ENABLE_BOT_REPLIES
        value: "true"
      - key: DM_BATCH_SIZE
        value: "3"
      - key: DM_INTERVAL_SECONDS
        value: "15"

  - type: cron
    name: giveaway-bot-wake
    runtime: python
    schedule: "*/10 * * * *"
    buildCommand: pip install -r requirements.txt
    startCommand: python scripts/cron_wake.py
    envVars:
      - key: CRON_WAKE_SECRET
        fromService:
          type: web
          name: giveaway-bot
          envVarKey: CRON_WAKE_SECRET
      - key: WAKE_HOST
        fromService:
          type: web
          name: giveaway-bot
          property: host

databases:
  - name: giveaway-bot-db
    plan: starter
    databaseName: giveaway_bot
    user: giveaway_bot